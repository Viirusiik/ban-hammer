<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI BAN HAMMER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --neon-green: #00ff9d;
            --neon-red: #ff2e63;
            --text-main: #ffffff;
            --text-muted: #8892b0;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Space Grotesk', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 255, 157, 0.05) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(255, 46, 99, 0.05) 0%, transparent 40%);
        }
        
        .container { 
            width: 100%; 
            max-width: 450px; 
            height: 95vh; 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color); 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .header { 
            padding: 20px; 
            border-bottom: 1px solid var(--border-color); 
            text-align: center; 
            background: rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        
        .header h1 { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px; 
            font-weight: 800;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .header p { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
        
        .timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--neon-red);
            margin-top: 8px;
            font-weight: 700;
        }
        
        .topic { color: var(--text-muted); font-size: 13px; margin-top: 8px; }
        .topic span { color: var(--text-main); font-weight: 500; }
        
        .lobby { 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            flex-grow: 1; 
            gap: 15px;
        }
        
        .warning {
            font-size: 11px;
            color: var(--neon-red);
            text-align: center;
            margin-bottom: 10px;
            opacity: 0.8;
        }
        
        input { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border-color); 
            color: var(--text-main); 
            padding: 15px; 
            border-radius: 10px; 
            font-family: inherit; 
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            width: 100%;
        }
        
        input:focus { border-color: var(--neon-green); box-shadow: 0 0 0 3px rgba(0, 255, 157, 0.1); }
        
        button { 
            background: var(--neon-green); 
            color: #000; 
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-family: inherit; 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 14px;
            transition: 0.3s; 
            width: 100%;
        }
        
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 157, 0.3); }
        button.secondary { background: transparent; color: var(--text-main); border: 1px solid var(--border-color); }
        button.secondary:hover { border-color: var(--neon-green); color: var(--neon-green); box-shadow: none; }
        
        .divider { height: 1px; background: var(--border-color); margin: 10px 0; }
        
        .game-view { display: flex; flex-direction: column; flex-grow: 1; min-height: 0; }
        
        .users-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 15px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .user-badge { padding: 6px 12px; background: rgba(255,255,255,0.05); font-size: 12px; border-radius: 20px; border: 1px solid var(--border-color); transition: 0.3s; }
        .user-badge.banned { border-color: var(--neon-red); color: var(--neon-red); text-decoration: line-through; opacity: 0.5; background: rgba(255, 46, 99, 0.1); }
        
        .chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
        
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .message span { font-weight: 700; display: block; font-size: 11px; margin-bottom: 4px; opacity: 0.7; }
        .message.other { background: rgba(255,255,255,0.05); align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.self { background: var(--neon-green); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message.self span { color: rgba(0,0,0,0.6); }
        .message.system { text-align: center; font-size: 11px; color: var(--text-muted); background: transparent; align-self: center; padding: 5px; max-width: 90%; }
        .message.system span { display: none; }
        
        .ban-message { 
            width: 90%; 
            text-align: center; 
            background: linear-gradient(45deg, rgba(255, 46, 99, 0.2), rgba(255, 46, 99, 0.05)); 
            border: 2px solid var(--neon-red); 
            color: #fff; 
            padding: 20px; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 16px; 
            margin: 15px 0;
            align-self: center;
            box-shadow: 0 0 20px rgba(255, 46, 99, 0.2);
        }
        .ban-message b { color: var(--neon-red); display: block; font-size: 18px; margin-bottom: 10px; }
        
        .input-area { display: flex; padding: 15px; border-top: 1px solid var(--border-color); gap: 10px; background: rgba(0,0,0,0.2); flex-shrink: 0; }
        .input-area input { flex-grow: 1; margin: 0; }
        .input-area button { width: auto; padding: 0 20px; margin: 0; }
        
        .banned-overlay {
            padding: 15px;
            text-align: center;
            background: rgba(255, 46, 99, 0.1);
            border-top: 1px solid var(--neon-red);
            color: var(--neon-red);
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .error { color: var(--neon-red); font-size: 12px; text-align: center; min-height: 15px; }
        
        .modal { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(10, 11, 16, 0.95); 
            backdrop-filter: blur(10px);
            display: none; 
            justify-content: center; align-items: center; flex-direction: column; 
            z-index: 100; 
            padding: 20px;
            text-align: center;
        }
        .modal h2 { font-family: 'JetBrains Mono', monospace; font-size: 32px; margin-bottom: 20px; text-transform: uppercase; }
        .modal p { font-size: 16px; color: var(--text-muted); margin-bottom: 30px; max-width: 300px; }
    </style>
</head>
<body>
    <!-- Лобби -->
    <div class="container" id="lobby">
        <div class="header">
            <h1>AI Ban Hammer</h1>
            <p>Выживи в чате с безумным ИИ</p>
        </div>
        <div class="lobby">
            <div class="warning">⚠️ Важно: не обновляйте страницу после создания комнаты!</div>
            <input type="text" id="nickname" placeholder="Введи свой ник" maxlength="12">
            <button onclick="createRoom()">Создать комнату</button>
            <div class="divider"></div>
            <input type="text" id="roomCode" placeholder="Код комнаты (4 цифры)" maxlength="4">
            <button class="secondary" onclick="joinRoom()">Войти в комнату</button>
            <div class="error" id="error"></div>
        </div>
    </div>

    <!-- Игровой экран -->
    <div class="container" id="game" style="display: none;">
        <div class="header">
            <h1>Комната: <span id="roomIdDisplay"></span></h1>
            <div class="topic">Тема: <span id="topicDisplay"></span></div>
            <div class="timer" id="timerDisplay"></div>
        </div>
        <div class="game-view">
            <div class="users-list" id="usersList"></div>
            <div class="chat-box" id="chatBox"></div>
            <div class="input-area" id="inputArea">
                <input type="text" id="messageInput" placeholder="Пиши сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- Экран конца игры -->
    <div class="modal" id="gameOverModal">
        <h2 id="gameOverTitle">ИГРА ОКОНЧЕНА</h2>
        <p id="gameOverText"></p>
        <button onclick="location.reload()" style="width: auto; padding: 15px 40px;">Выйти</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId = null;
        let timerInterval = null;
        let audioCtx = null;

        // Инициализация звуков
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(freq, duration, type = 'sine', volume = 0.1) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = type;
            oscillator.frequency.value = freq;
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        socket.on('roomJoined', (data) => {
            myId = data.userId;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
            document.getElementById('roomIdDisplay').innerText = data.roomId;
            document.getElementById('topicDisplay').innerText = data.topic;
            
            if (timerInterval) clearInterval(timerInterval);
            const updateTimer = () => {
                const msLeft = data.startTime - Date.now();
                if (msLeft <= 0) {
                    document.getElementById('timerDisplay').innerText = "⚠️ ИИ АКТИВЕН ⚠️";
                    document.getElementById('timerDisplay').style.color = "var(--neon-green)";
                    clearInterval(timerInterval);
                } else {
                    const sec = Math.floor(msLeft / 1000);
                    document.getElementById('timerDisplay').innerText = `ИИ проснется через: ${sec} сек`;
                    if (sec <= 5 && sec > 0) {
                        playSound(1000, 0.05, 'square', 0.05); // Тик таймера
                    }
                }
            };
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        });

        socket.on('appError', (msg) => {
            const errDiv = document.getElementById('error');
            errDiv.innerText = msg;
            setTimeout(() => { errDiv.innerText = ''; }, 3000);
        });

        socket.on('updateUsers', (users) => {
            const list = document.getElementById('usersList');
            list.innerHTML = '';
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-badge' + (u.banned ? ' banned' : '');
                div.innerText = u.name;
                list.appendChild(div);
            });
        });

        socket.on('newMessage', (msg) => {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            
            if (msg.id === 'system') {
                div.className = 'message system';
                div.innerText = msg.text;
            } else {
                div.className = 'message ' + (msg.id === myId ? 'self' : 'other');
                div.innerHTML = `<span>${msg.name}</span>${msg.text}`;
                if (msg.id !== myId) playSound(800, 0.1, 'sine', 0.05); // Звук чужого сообщения
            }
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        socket.on('ban', (data) => {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = 'ban-message';
            div.innerHTML = `<b>🚫 ${data.name} ЗАБАНЕН!</b> Причина: ${data.reason}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;

            if (data.id === myId) {
                // Меня забанили
                playSound(150, 0.8, 'sawtooth', 0.2); // Звук моего бана
                document.getElementById('inputArea').innerHTML = '<div class="banned-overlay">ВЫ ЗАБАНЕНЫ! <br>Наблюдайте за оставшимися.</div>';
            } else {
                // Забанили кого-то другого
                playSound(400, 0.3, 'triangle', 0.1); // Звук чужого бана
            }
        });

        socket.on('gameOver', (winner) => {
            setTimeout(() => {
                playSound(500, 0.2, 'sine', 0.1);
                setTimeout(() => playSound(700, 0.3, 'sine', 0.1), 200);
                
                document.getElementById('gameOverTitle').innerText = "ИГРА ОКОНЧЕНА";
                document.getElementById('gameOverTitle').style.color = "var(--neon-green)";
                document.getElementById('gameOverText').innerText = `Последний выживший: ${winner}`;
                document.getElementById('gameOverModal').style.display = 'flex';
            }, 1000);
        });

        function createRoom() {
            initAudio(); // Включаем звук по клику (требование браузеров)
            const nick = document.getElementById('nickname').value.trim();
            if (!nick) return alert("Введи ник!");
            socket.emit('createRoom', nick);
        }

        function joinRoom() {
            initAudio();
            const nick = document.getElementById('nickname').value.trim();
            const code = document.getElementById('roomCode').value.trim();
            if (!nick || !code) return alert("Введи ник и код!");
            socket.emit('joinRoom', { roomId: code, nickname: nick });
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (text) {
                socket.emit('sendMessage', text);
                input.value = '';
                playSound(1200, 0.05, 'sine', 0.05); // Звук отправки сообщения
            }
        }
    </script>
</body>
</html>
