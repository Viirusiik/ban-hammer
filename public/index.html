<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI BAN HAMMER</title>
    <style>
        body { margin: 0; padding: 0; background: #050505; color: #0f0; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 600px; height: 90vh; border: 1px solid #0f0; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); display: flex; flex-direction: column; background: #0a0a0a; }
        .header { padding: 15px; border-bottom: 1px solid #0f0; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .header h1 { margin: 0; font-size: 20px; text-shadow: 0 0 10px #0f0; }
        .topic { color: #ff0040; font-size: 12px; margin-top: 5px; }
        .lobby { padding: 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        input { background: transparent; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 10px 0; width: 80%; font-family: inherit; box-sizing: border-box; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-family: inherit; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px #0f0; }
        .game-view { display: none; flex-direction: column; flex-grow: 1; }
        .users-list { display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; border-bottom: 1px solid #333; }
        .user-badge { padding: 5px 10px; border: 1px solid #0f0; font-size: 12px; border-radius: 15px; }
        .user-badge.banned { border-color: #ff0040; color: #ff0040; text-decoration: line-through; opacity: 0.5; }
        .chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 8px 12px; border-radius: 5px; font-size: 14px; word-wrap: break-word; }
        .message span { font-weight: bold; display: block; font-size: 11px; color: #aaa; }
        .message.other { background: #111; align-self: flex-start; border: 1px solid #333; }
        .message.self { background: #003b00; align-self: flex-end; }
        .ban-message { background: #1a0000; border: 1px solid #ff0040; color: #ff0040; text-align: center; align-self: center; max-width: 90%; font-weight: bold; animation: blink 0.5s 3; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #333; gap: 10px; }
        .input-area input { flex-grow: 1; margin: 0; }
        .error { color: #ff0040; font-size: 12px; margin-top: 10px; }
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 10; }
        .modal h2 { color: #ff0040; font-size: 30px; text-shadow: 0 0 20px #ff0040; text-align: center; }
        .modal p { font-size: 18px; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>
    <div class="container" id="lobby">
        <div class="header">
            <h1>AI BAN HAMMER 9000</h1>
            <p>Выживи в чате с безумным ИИ</p>
        </div>
        <div class="lobby">
            <input type="text" id="nickname" placeholder="Введи ник" maxlength="12">
            <div style="margin: 10px 0;">
                <button onclick="createRoom()">Создать комнату</button>
            </div>
            <input type="text" id="roomCode" placeholder="Код комнаты (4 цифры)" maxlength="4">
            <button onclick="joinRoom()">Войти в комнату</button>
            <div class="error" id="error"></div>
        </div>
    </div>

    <div class="container" id="game" style="display: none;">
        <div class="header">
            <h1>Комната: <span id="roomIdDisplay"></span></h1>
            <div class="topic">Тема: <span id="topicDisplay"></span></div>
        </div>
        <div class="game-view">
            <div class="users-list" id="usersList"></div>
            <div class="chat-box" id="chatBox"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Пиши сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">SEND</button>
            </div>
        </div>
    </div>

    <div class="modal" id="gameOverModal">
        <h2 id="gameOverTitle">ВЫ ЗАБАНЕНЫ</h2>
        <p id="gameOverText"></p>
        <button onclick="location.reload()" style="margin-top: 20px;">Выйти</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId = null;

        socket.on('roomJoined', (data) => {
            myId = data.userId;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
            document.getElementById('roomIdDisplay').innerText = data.roomId;
            document.getElementById('topicDisplay').innerText = data.topic;
        });

        socket.on('error', (msg) => {
            document.getElementById('error').innerText = msg;
        });

        socket.on('updateUsers', (users) => {
            const list = document.getElementById('usersList');
            list.innerHTML = '';
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-badge' + (u.banned ? ' banned' : '');
                div.innerText = u.name;
                list.appendChild(div);
            });
        });

        socket.on('newMessage', (msg) => {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = 'message ' + (msg.id === myId ? 'self' : 'other');
            div.innerHTML = `<span>${msg.name}</span>${msg.text}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        socket.on('ban', (data) => {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = 'message ban-message';
            div.innerHTML = `🚫 ${data.name} ЗАБАНЕН! Причина: ${data.reason}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;

            if (data.id === myId) {
                document.getElementById('gameOverTitle').innerText = "ВЫ ЗАБАНЕНЫ";
                document.getElementById('gameOverTitle').style.color = "#ff0040";
                document.getElementById('gameOverText').innerText = data.reason;
                document.getElementById('gameOverModal').style.display = 'flex';
            }
        });

        socket.on('gameOver', (winner) => {
            document.getElementById('gameOverTitle').innerText = "ПОБЕДА!";
            document.getElementById('gameOverTitle').style.color = "#0f0";
            document.getElementById('gameOverText').innerText = `Последний выживший: ${winner}`;
            document.getElementById('gameOverModal').style.display = 'flex';
        });

        function createRoom() {
            const nick = document.getElementById('nickname').value.trim();
            if (!nick) return alert("Введи ник!");
            socket.emit('createRoom', nick);
        }

        function joinRoom() {
            const nick = document.getElementById('nickname').value.trim();
            const code = document.getElementById('roomCode').value.trim();
            if (!nick || !code) return alert("Введи ник и код!");
            socket.emit('joinRoom', { roomId: code, nickname: nick });
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (text) {
                socket.emit('sendMessage', text);
                input.value = '';
            }
        }
    </script>
</body>
</html>
